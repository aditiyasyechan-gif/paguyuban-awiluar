<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galeri Hari Besar Nasional</title>

<link rel="stylesheet" href="../../style.css">


<style>

body{

font-family:Arial,sans-serif;

background:linear-gradient(135deg,#eaf2ff,#f7faff);

}


/* TOMBOL KEMBALI */

.back-btn{

display:inline-block;

margin:15px 20px;

padding:10px 15px;

background:white;

border-radius:12px;

text-decoration:none;

color:#333;

font-weight:bold;

box-shadow:0 6px 15px rgba(0,0,0,.08);

}




/* CAPTION */

.caption{

margin:20px;

padding:15px;

background:white;

border-radius:15px;

box-shadow:0 6px 15px rgba(0,0,0,.08);

font-size:14px;

color:#555;

}




/* GALERI */

.gallery{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:8px;

padding:15px;

}



.photo{

background:white;

border-radius:12px;

overflow:hidden;

box-shadow:0 6px 15px rgba(0,0,0,.08);

}



.photo img{

width:100%;

aspect-ratio:1/1;

object-fit:cover;

cursor:pointer;

}



.photo p{

margin:0;

padding:10px;

font-size:13px;

text-align:center;

}




/* KOSONG */

.kosong{

background:white;

margin:20px;

padding:20px;

border-radius:15px;

text-align:center;

color:#777;

}




/* POPUP FOTO */

.popup-foto{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.85);

align-items:center;

justify-content:center;

z-index:999;

}



.popup-foto img{

max-width:95%;

max-height:90%;

border-radius:10px;

}



.close{

position:absolute;

top:20px;

right:25px;

font-size:35px;

color:white;

cursor:pointer;

}


</style>


</head>


<body>



<a href="index.html" class="back-btn">

← Kembali ke Galeri

</a>




<div class="caption">

📅 Kegiatan Hari Besar Nasional Tahun 2026

</div>




<div class="gallery" id="galeriNasional">

</div>





<div class="popup-foto" id="popupFoto" onclick="tutupFoto()">


<div class="close">×</div>


<img id="gambarBesar">


</div>





<script>


let dataGaleri = JSON.parse(

localStorage.getItem("dataGaleri")

) || [];



let tampil="";

let jumlah=0;



dataGaleri.forEach(function(item){



if(item.kategori.trim()=="PHBN"){



jumlah++;



tampil += `


<div class="photo">


<img src="${item.foto}" onclick="bukaFoto('${item.foto}')">


<p>${item.judul}</p>


</div>


`;



}


});





if(jumlah==0){


tampil=`

<div class="kosong">

Belum ada dokumentasi Hari Besar Nasional.

</div>

`;

}



document.getElementById("galeriNasional").innerHTML=tampil;





function bukaFoto(src){


document.getElementById("gambarBesar").src=src;


document.getElementById("popupFoto").style.display="flex";


}



function tutupFoto(){


document.getElementById("popupFoto").style.display="none";


}



</script>


</body>

</html>
