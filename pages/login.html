<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Admin</title>

<link rel="stylesheet" href="../style.css">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#eef5f1;
    font-family:Arial;
}

.login-box{
    width:300px;
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.login-box h2{
    color:#1b7d46;
}

input{
    width:90%;
    padding:12px;
    margin:8px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:95%;
    padding:12px;
    margin-top:10px;
    border:0;
    border-radius:8px;
    background:#1b7d46;
    color:white;
    font-size:16px;
}

button:hover{
    background:#145c34;
}

#error{
    color:red;
    margin-top:10px;
}

</style>

</head>

<body>


<div class="login-box">

<h2>🔐 Admin</h2>

<p>Paguyuban Awiluar</p>


<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">


<button onclick="login()">
Masuk
</button>


<div id="error"></div>


</div>

<script>

function login(){

let username =
document.getElementById("username").value.trim();

let password =
document.getElementById("password").value.trim();


// LOGIN ADMIN

if(username=="admin" && password=="1234"){


localStorage.setItem("admin_login","true");

localStorage.setItem("login","true");


window.location.href="admin.html";


}


// LOGIN WARGA

else if(username=="warga" && password=="awiluar2026"){


localStorage.removeItem("admin_login");


localStorage.setItem("login","true");

localStorage.setItem("warga_login","true");


window.location.href="../index.html";


}


// PASSWORD SALAH

else{


document.getElementById("error").innerHTML =
"Username atau Password salah!";


}


}

</script>


</body>
</html>
