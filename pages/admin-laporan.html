<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kelola Laporan</title>

<link rel="stylesheet" href="../style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>

body{
background:#f4f8fb;
}


.form-box,
.search-box,
.laporan-card{

background:white;

margin:20px;

padding:20px;

border-radius:20px;

box-shadow:0 6px 18px rgba(0,0,0,.08);

}


input,
textarea{

width:100%;

padding:13px;

margin-bottom:15px;

border-radius:12px;

border:1px solid #ddd;

box-sizing:border-box;

font-size:15px;

}


textarea{

height:120px;

resize:none;

}


input:focus,
textarea:focus{

outline:none;

border-color:#3498db;

}


button{

border:none;

border-radius:20px;

padding:10px 18px;

cursor:pointer;

}


.btn-simpan{

width:100%;

background:#3498db;

color:white;

font-size:16px;

}


.laporan-header{

display:flex;

align-items:center;

gap:12px;

}


.icon-laporan{

width:42px;

height:42px;

background:#3498db;

color:white;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

}


.laporan-card h3{

margin:0;

color:#3498db;

}


.laporan-card p{

font-size:14px;

color:#555;

}


.btn-edit,
.btn-hapus{

padding:7px 14px;

font-size:13px;

margin-top:10px;

}


.btn-edit{

background:#3498db;

color:white;

}


.btn-hapus{

background:#e74c3c;

color:white;

}


.popup{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.45);

align-items:center;

justify-content:center;

}


.popup-box{

background:white;

width:85%;

padding:25px;

border-radius:20px;

text-align:center;

}

</style>


</head>


<body>


<a href="admin.html" class="back-btn">

← Kembali Admin

</a>


<div class="card">

<h2>

<i class="fa fa-file-lines"></i>

Kelola Laporan

</h2>


<p>

Mengelola laporan kegiatan warga

</p>


</div>



<div class="form-box">


<h3>

<i class="fa fa-plus"></i>

Tambah Laporan

</h3>



<input id="kegiatan"

placeholder="Nama Kegiatan">



<input id="anggaran"

type="number"

placeholder="Anggaran">


<input id="pengeluaran"

type="number"

placeholder="Pengeluaran"

oninput="hitungSisa()">



<input id="sisa"

placeholder="Sisa Anggaran"

readonly>


<textarea id="laporan"

placeholder="Isi laporan kegiatan"></textarea>



<button class="btn-simpan"

onclick="simpanLaporan()">


<i class="fa fa-save"></i>

Simpan Data


</button>


</div>



<div class="search-box">


<input id="cari"

placeholder="🔍 Cari laporan"

onkeyup="tampilkanLaporan()">



</div>


<div id="hasil"></div>

<script>


let dataLaporan = JSON.parse(

localStorage.getItem("dataLaporan")

) || [];



let editIndex = -1;

let hapusIndex = -1;





function hitungSisa(){


let anggaran =

Number(document.getElementById("anggaran").value) || 0;



let pengeluaran =

Number(document.getElementById("pengeluaran").value) || 0;



let sisa = anggaran - pengeluaran;



document.getElementById("sisa").value =

"Rp " + sisa.toLocaleString("id-ID");



}








function simpanLaporan(){



let data = {


kegiatan:

document.getElementById("kegiatan").value,


anggaran:

document.getElementById("anggaran").value,


pengeluaran:

document.getElementById("pengeluaran").value,


sisa:

document.getElementById("sisa").value,


laporan:

document.getElementById("laporan").value


};






if(

data.kegiatan=="" ||

data.anggaran==""

){


alert("Nama kegiatan dan anggaran wajib diisi");


return;


}






if(editIndex==-1){


dataLaporan.push(data);



}else{


dataLaporan[editIndex]=data;


editIndex=-1;


}





localStorage.setItem(

"dataLaporan",

JSON.stringify(dataLaporan)

);





kosongkanForm();


tampilkanLaporan();



alert("Laporan berhasil disimpan");



}










function tampilkanLaporan(){



let hasil="";



let cari =

document.getElementById("cari")

.value

.toLowerCase();





dataLaporan.forEach(function(item,index){



let teks =

(

item.kegiatan +

item.laporan

)

.toLowerCase();






if(teks.includes(cari)){



hasil += `



<div class="laporan-card">



<div class="laporan-header">



<div class="icon-laporan">

<i class="fa fa-file-lines"></i>

</div>



<div>

<h3>

${item.kegiatan}

</h3>


<p>

Laporan Kegiatan

</p>


</div>


</div>





<p>

<b>Anggaran:</b>

Rp ${Number(item.anggaran).toLocaleString("id-ID")}

</p>




<p>

<b>Pengeluaran:</b>

Rp ${Number(item.pengeluaran).toLocaleString("id-ID")}

</p>




<p>

<b>Sisa Anggaran:</b>

${item.sisa}

</p>




<p>

<b>Laporan:</b><br>

${item.laporan}

</p>





<button class="btn-edit"

onclick="editData(${index})">

✏️ Edit

</button>





<button class="btn-hapus"

onclick="bukaPopup(${index})">

🗑 Hapus

</button>



</div>



`;



}



});





document.getElementById("hasil")

.innerHTML = hasil;



}









function editData(index){



let data = dataLaporan[index];



document.getElementById("kegiatan").value =

data.kegiatan;



document.getElementById("anggaran").value =

data.anggaran;



document.getElementById("pengeluaran").value =

data.pengeluaran;



document.getElementById("sisa").value =

data.sisa;



document.getElementById("laporan").value =

data.laporan;





editIndex=index;



window.scrollTo({

top:0,

behavior:"smooth"

});



}









function bukaPopup(index){


hapusIndex=index;



document.getElementById("popupHapus")

.style.display="flex";



}








function tutupPopup(){


document.getElementById("popupHapus")

.style.display="none";


}







function hapusSetuju(){



if(hapusIndex!=-1){



dataLaporan.splice(

hapusIndex,

1

);





localStorage.setItem(

"dataLaporan",

JSON.stringify(dataLaporan)

);





tampilkanLaporan();



}



tutupPopup();



}









function kosongkanForm(){



document.getElementById("kegiatan").value="";


document.getElementById("anggaran").value="";


document.getElementById("pengeluaran").value="";


document.getElementById("sisa").value="";


document.getElementById("laporan").value="";


}





tampilkanLaporan();



</script>





<!-- POPUP HAPUS -->


<div class="popup" id="popupHapus">


<div class="popup-box">


<h3>

🗑 Hapus Laporan?

</h3>


<p>

Apakah yakin ingin menghapus laporan ini?

</p>



<button class="btn-hapus"

onclick="hapusSetuju()">

Ya, Hapus

</button>



<br><br>



<button class="btn-edit"

onclick="tutupPopup()">

Batal

</button>



</div>


</div>





</body>

</html>
