<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kelola Data Warga</title>

<link rel="stylesheet" href="../style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>

body{
background:#f4f8fb;
}


/* BOX */

.form-box,
.search-box,
.table-box{

background:white;

margin:20px;

padding:20px;

border-radius:20px;

box-shadow:0 6px 18px rgba(0,0,0,.08);

}




input,
select{

width:100%;

padding:13px;

margin-bottom:15px;

border-radius:12px;

border:1px solid #ddd;

box-sizing:border-box;

font-size:15px;

}



input:focus,
select:focus{

outline:none;

border-color:#3498db;

}




.btn-simpan{

width:100%;

padding:12px;

border:none;

border-radius:20px;

background:#3498db;

color:white;

font-size:16px;

cursor:pointer;

}




/* TABLE */

.table-scroll{

overflow-x:auto;

}



table{

width:100%;

border-collapse:collapse;

font-size:14px;

}



th{

background:#3498db;

color:white;

padding:12px;

}



td{

padding:10px;

border-bottom:1px solid #eee;

text-align:center;

}




.btn-edit,
.btn-hapus{

border:none;

padding:7px 12px;

border-radius:15px;

color:white;

cursor:pointer;

font-size:12px;

}



.btn-edit{

background:#3498db;

}



.btn-hapus{

background:#e74c3c;

margin-left:5px;

}




.popup{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.35);

backdrop-filter:blur(5px);

align-items:center;

justify-content:center;

z-index:999;

}



.popup-box{

background:white;

width:85%;

max-width:350px;

padding:30px 25px;

border-radius:25px;

text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,.2);

animation:muncul .25s ease;

}



.popup-box h3{

margin-top:10px;

font-size:20px;

color:#333;

}



.popup-box p{

color:#777;

font-size:14px;

margin-bottom:25px;

}



.popup-box h3:before{

content:"🗑";

display:flex;

width:55px;

height:55px;

margin:0 auto 15px;

background:#ffe5e5;

border-radius:50%;

align-items:center;

justify-content:center;

font-size:25px;

}



.popup-box .btn-hapus{

background:#e74c3c;

padding:10px 22px;

border-radius:20px;

margin-right:8px;

}



.popup-box .btn-edit{

background:#3498db;

padding:10px 22px;

border-radius:20px;

}



@keyframes muncul{

from{

transform:scale(.8);

opacity:0;

}

to{

transform:scale(1);

opacity:1;

}

}


</style>


</head>


<body>



<a href="admin.html" class="back-btn">

← Kembali Admin

</a>





<div class="card">

<h2>

<i class="fa fa-users"></i>

Kelola Data Warga

</h2>


<p>

Input data penduduk satu per satu

</p>


</div>







<div class="form-box">


<h3>

<i class="fa fa-user-plus"></i>

Input Warga

</h3>





<input 
id="nama"

placeholder="Nama Warga">





<select id="kelamin">


<option value="">

Pilih Jenis Kelamin

</option>


<option value="Laki-laki">

Laki-laki

</option>


<option value="Perempuan">

Perempuan

</option>


</select>





<input

id="nohp"

placeholder="Nomor HP">





<input

id="keterangan"

placeholder="Keterangan (opsional)">





<button class="btn-simpan"

onclick="simpanData()">


<i class="fa fa-save"></i>

Simpan Data


</button>




</div>







<div class="search-box">


<input

id="cari"

placeholder="🔍 Cari nama warga..."

onkeyup="tampilkanData()">



</div>






<div class="table-box">


<div class="table-scroll">


<table>


<thead>

<tr>

<th>No</th>

<th>Nama</th>

<th>Jenis Kelamin</th>

<th>No HP</th>

<th>Keterangan</th>

<th>Aksi</th>


</tr>

</thead>


<tbody id="hasil">


</tbody>


</table>


</div>


</div>

<div class="popup" id="popupHapus">


<div class="popup-box">


<h3>

Hapus Data Warga?

</h3>


<p>

Apakah yakin ingin menghapus data ini?

</p>



<button class="btn-hapus"

onclick="hapusSetuju()">

Ya, Hapus

</button>



<button class="btn-edit"

onclick="tutupPopup()">

Batal

</button>


</div>


</div>






<script>


let warga = JSON.parse(

localStorage.getItem("dataWarga")

) || [];



let editIndex = -1;

let hapusIndex = -1;







function simpanData(){



let data = {


nama:

document.getElementById("nama").value,


kelamin:

document.getElementById("kelamin").value,


nohp:

document.getElementById("nohp").value,


keterangan:

document.getElementById("keterangan").value


};






if(data.nama=="" || data.kelamin==""){


alert("Nama dan jenis kelamin wajib diisi");

return;


}






if(editIndex == -1){


warga.push(data);



}else{


warga[editIndex]=data;


editIndex=-1;


}






localStorage.setItem(

"dataWarga",

JSON.stringify(warga)

);





kosongkanForm();


tampilkanData();


alert("Data warga berhasil disimpan");



}








function tampilkanData(){



let hasil="";


let cari = document

.getElementById("cari")

.value

.toLowerCase();






warga.forEach(function(item,index){



let teks =

(

item.nama +

" " +

item.kelamin +

" " +

item.nohp +

" " +

item.keterangan

)

.toLowerCase();







if(teks.includes(cari)){



hasil += `



<tr>


<td>

${index + 1}

</td>



<td>

${item.nama}

</td>



<td>

${item.kelamin}

</td>



<td>

${item.nohp}

</td>



<td>

${item.keterangan}

</td>



<td>


<button class="btn-edit"

onclick="editData(${index})">

✏

</button>



<button class="btn-hapus"

onclick="bukaPopup(${index})">

🗑

</button>



</td>



</tr>



`;



}


});






document.getElementById("hasil").innerHTML = hasil;



}








function editData(index){



let data = warga[index];



document.getElementById("nama").value =

data.nama;



document.getElementById("kelamin").value =

data.kelamin;



document.getElementById("nohp").value =

data.nohp;



document.getElementById("keterangan").value =

data.keterangan;





editIndex=index;





window.scrollTo({

top:0,

behavior:"smooth"

});



}









function bukaPopup(index){


hapusIndex=index;


document.getElementById("popupHapus")

.style.display="flex";


}







function tutupPopup(){


document.getElementById("popupHapus")

.style.display="none";


}







function hapusSetuju(){



if(hapusIndex!=-1){



warga.splice(hapusIndex,1);



localStorage.setItem(

"dataWarga",

JSON.stringify(warga)

);



tampilkanData();



}



tutupPopup();


}








function kosongkanForm(){


document.getElementById("nama").value="";


document.getElementById("kelamin").value="";


document.getElementById("nohp").value="";


document.getElementById("keterangan").value="";


}





tampilkanData();



</script>



</body>

</html>
