<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kas Warga</title>


<link rel="stylesheet" href="../style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>


/* TABEL LAPORAN */

.table-box{

background:white;

margin-top:20px;

padding:20px;

border-radius:20px;

box-shadow:0 6px 18px rgba(0,0,0,.08);

overflow-x:auto;

}



table{

width:100%;

border-collapse:collapse;

font-size:14px;

}



th{

background:#3498db;

color:white;

padding:12px;

white-space:nowrap;

}



td{

padding:10px;

border-bottom:1px solid #ddd;

text-align:center;

white-space:nowrap;

}



</style>


</head>



<body>



<!-- BACK BUTTON -->

<a href="../index.html" class="back-btn">

← Kembali ke Home

</a>





<!-- HEADER -->

<div class="card">


<h2>

<i class="fa fa-wallet"></i>

Kas Warga

</h2>


<p>

Informasi keuangan paguyuban

</p>


</div>





<!-- RINGKASAN KAS -->


<div class="profile-grid">



<!-- PEMASUKAN -->

<div class="info-box">


<i class="fa fa-arrow-down"></i>


<div>

<h3>

Pemasukan

</h3>


<p id="totalMasuk">

Rp 0

</p>


</div>


</div>





<!-- PENGELUARAN -->


<div class="info-box">


<i class="fa fa-arrow-up"></i>


<div>


<h3>

Pengeluaran

</h3>


<p id="totalKeluar">

Rp 0

</p>


</div>


</div>







<!-- SISA KAS -->


<div class="info-box">


<i class="fa fa-wallet"></i>


<div>


<h3>

Sisa Kas

</h3>


<p id="sisaKas">

Rp 0

</p>


</div>


</div>



</div>







<!-- RIWAYAT KAS -->


<div class="card">


<h3>

📋 Riwayat Kas

</h3>




<div class="profile-grid" id="riwayatKas">





</div>


</div>







<!-- LAPORAN KAS EXCEL -->


<div class="card">


<h3>

📊 Laporan Kas Warga

</h3>



<div class="table-box">


<table>


<thead>


<tr>


<th>No</th>

<th>Nama</th>

<th>Jenis</th>

<th>Keterangan</th>

<th>Jumlah</th>

<th>Tanggal</th>


</tr>


</thead>



<tbody id="tabelKas">


</tbody>


</table>



</div>



</div>
<script>


let dataKas = JSON.parse(

localStorage.getItem("dataKas")

) || [];





let pemasukan = 0;

let pengeluaran = 0;





// HITUNG TOTAL KAS

dataKas.forEach(function(item){



let jumlah = Number(item.jumlah);



if(item.jenis == "Pemasukan"){


pemasukan += jumlah;


}else{


pengeluaran += jumlah;


}



});





document.getElementById("totalMasuk").innerHTML =

"Rp " + pemasukan.toLocaleString("id-ID");





document.getElementById("totalKeluar").innerHTML =

"Rp " + pengeluaran.toLocaleString("id-ID");





document.getElementById("sisaKas").innerHTML =

"Rp " + (pemasukan - pengeluaran)

.toLocaleString("id-ID");









// TAMPILKAN RIWAYAT KAS CARD



let riwayat = "";



dataKas.slice().reverse().forEach(function(item){



let icon = "";

let tanda = "";



if(item.jenis == "Pemasukan"){


icon = "fa-plus-circle";

tanda = "+";


}else{


icon = "fa-minus-circle";

tanda = "-";


}






riwayat += `



<div class="info-box">


<i class="fa ${icon}"></i>



<div>


<h3>

${item.nama}

</h3>



<p>

${item.keterangan}

</p>



<p>

${tanda}

Rp ${Number(item.jumlah)

.toLocaleString("id-ID")}

</p>



<p>

📅 ${item.tanggal}

</p>


</div>



</div>



`;



});





document.getElementById("riwayatKas").innerHTML = riwayat;










// TAMPILKAN TABEL LAPORAN



let tabel = "";



dataKas.forEach(function(item,index){



tabel += `



<tr>



<td>

${index+1}

</td>



<td>

${item.nama}

</td>



<td>

${item.jenis}

</td>



<td>

${item.keterangan}

</td>



<td>

Rp ${Number(item.jumlah)

.toLocaleString("id-ID")}

</td>



<td>

${item.tanggal}

</td>



</tr>



`;



});





document.getElementById("tabelKas").innerHTML = tabel;



</script>




</body>

</html>
