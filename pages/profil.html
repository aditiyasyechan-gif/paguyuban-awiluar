<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profil Paguyuban</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

.profile-icon,
.card h2 i,
.info-box i{
    color:#3498db;
}

</style>
<style>

.card h2 i,
.info-box i {
    color:#3498db;
}

</style>

</head>


<body>


<!-- BACK BUTTON -->
<a href="../index.html" class="back-btn">
← Kembali ke Home
</a>


<!-- HEADER -->
<div class="card">

<h2>Profil Paguyuban</h2>

<p>Informasi tentang Paguyuban Awiluar</p>

</div>



<!-- HERO -->

<div class="profile-hero">

<i class="fa fa-building profile-icon"></i>

<div>

<h1 id="nama">
Paguyuban Awiluar
</h1>

<p>
Profil Organisasi
</p>

</div>

</div>


<!-- INFORMASI UTAMA -->

<div class="profile-grid">


<div class="info-box">

<i class="fa fa-calendar"></i>

<div>

<h3>Tahun Berdiri</h3>

<p id="tahun">
-
</p>

</div>

</div>



<div class="info-box">

<i class="fa fa-users"></i>

<div>

<h3>Jumlah Anggota</h3>

<p id="anggota">
-
</p>

</div>

</div>



<div class="info-box">

<i class="fa fa-check-circle"></i>

<div>

<h3>Status</h3>

<p id="status">
-
</p>

</div>

</div>


</div>




<!-- SEJARAH -->

<div class="card">

<h2>
<i class="fa fa-book"></i>
Sejarah
</h2>

<p id="sejarah">
Belum ada data.
</p>

</div>





<!-- VISI MISI -->

<div class="card">

<h2>
<i class="fa fa-bullseye"></i>
Visi
</h2>

<p id="visi">
Belum ada data.
</p>

</div>


<div class="card">

<h2>
<i class="fa fa-list"></i>
Misi
</h2>

<p id="misi">
Belum ada data.
</p>

</div>






<!-- KONTAK -->

<div class="card">

<h2>
<i class="fa fa-address-book"></i>
Kontak & Alamat
</h2>


<p>
<i class="fa fa-location-dot"></i>
<span id="alamat">
Belum ada data.
</span>
</p>


<p>
<i class="fa fa-phone"></i>
<span id="kontak">
Belum ada data.
</span>
</p>


</div>






<script>


document.getElementById("nama").innerHTML =
localStorage.getItem("profil_nama") || "Paguyuban Awiluar";


document.getElementById("tahun").innerHTML =
localStorage.getItem("profil_tahun") || "-";


document.getElementById("anggota").innerHTML =
localStorage.getItem("profil_anggota") || "-";


document.getElementById("status").innerHTML =
localStorage.getItem("profil_status") || "-";


document.getElementById("sejarah").innerHTML =
localStorage.getItem("profil_sejarah") || "Belum ada data.";


document.getElementById("visi").innerHTML =
localStorage.getItem("profil_visi") || "Belum ada data.";


document.getElementById("misi").innerHTML =
localStorage.getItem("profil_misi") || "Belum ada data.";


document.getElementById("alamat").innerHTML =
localStorage.getItem("profil_alamat") || "Belum ada data.";


document.getElementById("kontak").innerHTML =
localStorage.getItem("profil_kontak") || "Belum ada data.";


</script>


</body>

</html>
