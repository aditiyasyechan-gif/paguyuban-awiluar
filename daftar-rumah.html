<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daftar Rumah</title>

<link rel="stylesheet" href="../style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>

/* SEARCH MODERN */

.search-box-rumah{

background:white;

margin:20px;

padding:12px 15px;

border-radius:18px;

display:flex;

align-items:center;

gap:12px;

box-shadow:0 5px 15px rgba(0,0,0,.08);

}


.search-box-rumah i{

color:#3498db;

font-size:18px;

}


.search-box-rumah input{

border:none;

outline:none;

width:100%;

font-size:15px;

}


/* ICON RUMAH */

.rumah-item > i{

width:32px;

height:32px;

border-radius:50%;

background:#eaf5ff;

color:#3498db;

display:flex;

align-items:center;

justify-content:center;

font-size:14px;

flex-shrink:0;

}



/* ISI DATA */

.rumah-item h3{

font-size:16px;

color:#3498db;

margin-bottom:8px;

}



.rumah-item p{

margin:5px 0;

font-size:14px;

color:#555;

}



.rumah-item p i{

color:#3498db;

width:18px;

margin-right:5px;

font-size:14px;

}


</style>


</head>



<body>



<!-- BACK BUTTON -->

<a href="../index.html" class="back-btn">

← Kembali ke Home

</a>




<!-- HEADER -->

<div class="card">

<h2>

<i class="fa fa-house"></i>

Daftar Rumah

</h2>


<p>

Data rumah warga Paguyuban Awiluar

</p>

</div>





<!-- SEARCH -->

<div class="search-box-rumah">


<i class="fa fa-search"></i>


<input

type="text"

id="searchRumah"

placeholder="Cari nama pemilik atau alamat...">


</div>





<!-- LIST RUMAH -->

<div class="profile-grid" id="listRumah">


</div>
<script>


let dataRumah = JSON.parse(

localStorage.getItem("daftarRumah")

) || [];





function tampilkanRumah(){


let keyword = document

.getElementById("searchRumah")

.value

.toLowerCase();



let hasil = "";




dataRumah.forEach(function(rumah){



let cariData = 

(

rumah.nama +

" " +

rumah.alamat +

" " +

(rumah.nohp || "")

)

.toLowerCase();





if(cariData.includes(keyword)){



hasil += `



<div class="info-box rumah-item">

<div>

<h3>

Pemilik: ${rumah.nama}

</h3>




<p>

<i class="fa fa-phone"></i>

${rumah.nohp || "-"}

</p>




<p>

<i class="fa fa-users"></i>

Anggota:

${rumah.anggota || 0} Orang

</p>




<p>

<i class="fa fa-people-roof"></i>

Total:

${rumah.total || "-"} 

</p>




<p>

<i class="fa fa-location-dot"></i>

${rumah.alamat}

</p>



</div>



</div>



`;



}


});





document.getElementById("listRumah").innerHTML = hasil;



}





document

.getElementById("searchRumah")

.addEventListener("input", function(){

tampilkanRumah();

});





tampilkanRumah();



</script>



</body>

</html>
