<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kelola Kas Warga</title>

<link rel="stylesheet" href="../style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>

body{
background:#f4f8fb;
}


/* BOX */

.form-box,
.search-box,
.table-box{

background:white;

margin:20px;

padding:20px;

border-radius:20px;

box-shadow:0 6px 18px rgba(0,0,0,.08);

}



/* INPUT */

input,
select{

width:100%;

padding:13px;

margin-bottom:15px;

border-radius:12px;

border:1px solid #ddd;

box-sizing:border-box;

font-size:15px;

}



input:focus,
select:focus{

outline:none;

border-color:#3498db;

}




/* BUTTON */

button{

border:none;

cursor:pointer;

}



.btn-simpan{

width:100%;

padding:12px;

background:#3498db;

color:white;

border-radius:20px;

font-size:16px;

}




.btn-edit{

background:#3498db;

color:white;

padding:7px 12px;

border-radius:15px;

}



.btn-hapus{

background:#e74c3c;

color:white;

padding:7px 12px;

border-radius:15px;

}





/* TABLE */

.table-box{

overflow-x:auto;

}



table{

width:100%;

border-collapse:collapse;

font-size:14px;

}



th{

background:#3498db;

color:white;

padding:12px;

white-space:nowrap;

}



td{

padding:10px;

border-bottom:1px solid #ddd;

text-align:center;

white-space:nowrap;

}




/* POPUP */

.popup{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.4);

align-items:center;

justify-content:center;

z-index:999;

}



.popup-box{

background:white;

width:85%;

padding:25px;

border-radius:20px;

text-align:center;

}



</style>

</head>


<body>



<a href="admin.html" class="back-btn">

← Kembali Admin

</a>




<div class="card">

<h2>

<i class="fa fa-wallet"></i>

Kelola Kas Warga

</h2>


<p>

Input pemasukan dan pengeluaran kas

</p>

</div>






<div class="form-box">


<h3>

<i class="fa fa-plus"></i>

Input Kas

</h3>



<input id="nama"

placeholder="Nama Pembayar / Sumber Dana">





<select id="jenis">

<option value="">

Pilih Jenis

</option>


<option value="Pemasukan">

Pemasukan

</option>


<option value="Pengeluaran">

Pengeluaran

</option>


</select>





<input id="keterangan"

placeholder="Keterangan">





<input id="jumlah"

type="number"

placeholder="Jumlah Uang">





<input id="tanggal"

placeholder="Tanggal (contoh 08-07-2026)">






<button class="btn-simpan"

onclick="simpanKas()">


<i class="fa fa-save"></i>

Simpan Data


</button>


</div>





<div class="search-box">


<input id="cari"

placeholder="🔍 Cari data kas"

onkeyup="tampilkanKas()">



</div>





<div class="table-box">


<table>


<thead>


<tr>

<th>No</th>

<th>Nama</th>

<th>Jenis</th>

<th>Keterangan</th>

<th>Jumlah</th>

<th>Tanggal</th>

<th>Aksi</th>

</tr>


</thead>



<tbody id="hasilKas">


</tbody>


</table>


</div>

<!-- POPUP HAPUS -->

<div class="popup" id="popupHapus">


<div class="popup-box">


<h3>
🗑 Hapus Data Kas?
</h3>


<p>
Apakah yakin ingin menghapus transaksi ini?
</p>



<button class="btn-hapus"
onclick="hapusSetuju()">

Ya, Hapus

</button>


<br><br>


<button class="btn-edit"
onclick="tutupPopup()">

Batal

</button>


</div>

</div>





<script>


let dataKas = JSON.parse(

localStorage.getItem("dataKas")

) || [];



let editIndex = -1;

let hapusIndex = -1;





function simpanKas(){


let data = {


nama:
document.getElementById("nama").value,


jenis:
document.getElementById("jenis").value,


keterangan:
document.getElementById("keterangan").value,


jumlah:
document.getElementById("jumlah").value,


tanggal:
document.getElementById("tanggal").value


};





if(
data.nama=="" ||
data.jenis=="" ||
data.jumlah==""
){

alert("Nama, jenis dan jumlah wajib diisi");

return;

}





if(editIndex==-1){


dataKas.push(data);


}else{


dataKas[editIndex]=data;

editIndex=-1;


}





localStorage.setItem(

"dataKas",

JSON.stringify(dataKas)

);



kosongkanForm();


tampilkanKas();



}








function tampilkanKas(){


let hasil="";


let cari =

document.getElementById("cari")

.value

.toLowerCase();





dataKas.forEach(function(item,index){



let teks =

(
item.nama+
item.jenis+
item.keterangan
)

.toLowerCase();





if(teks.includes(cari)){



hasil += `



<tr>


<td>

${index+1}

</td>



<td>

${item.nama}

</td>



<td>

${item.jenis}

</td>



<td>

${item.keterangan}

</td>



<td>

Rp ${Number(item.jumlah)

.toLocaleString("id-ID")}

</td>



<td>

${item.tanggal}

</td>



<td>


<button class="btn-edit"

onclick="editKas(${index})">

✏

</button>



<button class="btn-hapus"

onclick="bukaPopup(${index})">

🗑

</button>


</td>



</tr>



`;



}



});





document.getElementById("hasilKas")

.innerHTML=hasil;



}









function editKas(index){


let data=dataKas[index];



document.getElementById("nama").value=

data.nama;



document.getElementById("jenis").value=

data.jenis;



document.getElementById("keterangan").value=

data.keterangan;



document.getElementById("jumlah").value=

data.jumlah;



document.getElementById("tanggal").value=

data.tanggal;



editIndex=index;



window.scrollTo({

top:0,

behavior:"smooth"

});



}









function bukaPopup(index){


hapusIndex=index;



document.getElementById("popupHapus")

.style.display="flex";



}








function tutupPopup(){


document.getElementById("popupHapus")

.style.display="none";


}









function hapusSetuju(){



if(hapusIndex!=-1){



dataKas.splice(hapusIndex,1);



localStorage.setItem(

"dataKas",

JSON.stringify(dataKas)

);



tampilkanKas();


}



tutupPopup();



}








function kosongkanForm(){


document.getElementById("nama").value="";


document.getElementById("jenis").value="";


document.getElementById("keterangan").value="";


document.getElementById("jumlah").value="";


document.getElementById("tanggal").value="";


}







tampilkanKas();



</script>



</body>

</html>
