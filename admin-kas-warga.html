<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kelola Kas Warga</title>

<link rel="stylesheet" href="../style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>

body{
background:#f4f8fb;
}


.form-box,
.search-box,
.kas-card{

background:white;

margin:20px;

padding:20px;

border-radius:20px;

box-shadow:0 6px 18px rgba(0,0,0,.08);

}



input,
select{

width:100%;

padding:13px;

margin-bottom:15px;

border-radius:12px;

border:1px solid #ddd;

box-sizing:border-box;

font-size:15px;

}



input:focus,
select:focus{

outline:none;

border-color:#3498db;

}



.btn-simpan{

width:100%;

padding:12px;

border:none;

border-radius:20px;

background:#3498db;

color:white;

font-size:16px;

cursor:pointer;

}




.kas-header{

display:flex;

align-items:center;

gap:12px;

}



.icon-kas{

width:40px;

height:40px;

background:#3498db;

color:white;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

font-size:18px;

}



.kas-card h3{

margin:0;

color:#3498db;

font-size:17px;

}



.kas-card p{

margin:5px 0;

color:#555;

font-size:14px;

}



.btn-edit,
.btn-hapus{

border:none;

padding:7px 14px;

border-radius:15px;

color:white;

cursor:pointer;

font-size:13px;

margin-top:10px;

}



.btn-edit{

background:#3498db;

}



.btn-hapus{

background:#e74c3c;

margin-left:5px;

}




.popup{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.35);

backdrop-filter:blur(5px);

align-items:center;

justify-content:center;

z-index:999;

}




.popup-box{

background:white;

width:85%;

max-width:350px;

padding:30px;

border-radius:25px;

text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,.2);

}



</style>


</head>



<body>



<a href="admin.html" class="back-btn">

← Kembali Admin

</a>




<div class="card">


<h2>

<i class="fa fa-wallet"></i>

Kelola Kas Warga

</h2>


<p>

Input pemasukan dan pengeluaran kas

</p>


</div>






<div class="form-box">


<h3>

<i class="fa fa-plus-circle"></i>

Input Transaksi

</h3>





<input

id="nama"

placeholder="Nama Pembayar / Sumber Dana">





<select id="jenis">


<option value="">

Pilih Jenis Transaksi

</option>


<option value="Pemasukan">

Pemasukan

</option>


<option value="Pengeluaran">

Pengeluaran

</option>


</select>





<input

id="keterangan"

placeholder="Keterangan Transaksi">





<input

id="jumlah"

type="number"

placeholder="Jumlah Uang">





<input

id="tanggal"

placeholder="Tanggal (contoh: 08-07-2026)">





<button class="btn-simpan"

onclick="simpanKas()">


<i class="fa fa-save"></i>

Simpan Data


</button>


</div>






<div class="search-box">


<input

id="cari"

placeholder="🔍 Cari transaksi..."

onkeyup="tampilkanKas()">



</div>





<div id="hasilKas">


</div>

<!-- POPUP HAPUS -->

<div class="popup" id="popupHapus">


<div class="popup-box">


<h3>

🗑 Hapus Transaksi?

</h3>


<p>

Apakah yakin ingin menghapus data kas ini?

</p>



<button class="btn-hapus"

onclick="hapusSetuju()">

Ya, Hapus

</button>



<button class="btn-edit"

onclick="tutupPopup()">

Batal

</button>


</div>


</div>





<script>


let dataKas = JSON.parse(

localStorage.getItem("dataKas")

) || [];



let editIndex = -1;

let hapusIndex = -1;





function simpanKas(){


let data = {


nama:

document.getElementById("nama").value,


jenis:

document.getElementById("jenis").value,


keterangan:

document.getElementById("keterangan").value,


jumlah:

document.getElementById("jumlah").value,


tanggal:

document.getElementById("tanggal").value


};





if(

data.nama=="" ||

data.jenis=="" ||

data.jumlah==""

){


alert("Nama, jenis, dan jumlah wajib diisi");


return;


}





if(editIndex == -1){


dataKas.push(data);



}else{


dataKas[editIndex]=data;


editIndex=-1;


}





localStorage.setItem(

"dataKas",

JSON.stringify(dataKas)

);





kosongkanForm();


tampilkanKas();


alert("Data kas berhasil disimpan");



}







function tampilkanKas(){



let hasil="";



let cari = document

.getElementById("cari")

.value

.toLowerCase();





dataKas.forEach(function(item,index){



let teks =

(

item.nama +

" " +

item.jenis +

" " +

item.keterangan

)

.toLowerCase();







if(teks.includes(cari)){



let warna = "";



if(item.jenis=="Pemasukan"){

warna="+"; 

}else{

warna="-";

}




hasil += `



<div class="kas-card">



<div class="kas-header">


<div class="icon-kas">


<i class="fa fa-wallet"></i>


</div>



<div>

<h3>

${item.nama}

</h3>


<p>

${item.jenis}

</p>


</div>


</div>





<p>

📋 ${item.keterangan}

</p>



<p>

💰 ${warna} Rp ${Number(item.jumlah).toLocaleString("id-ID")}

</p>



<p>

📅 ${item.tanggal}

</p>




<button class="btn-edit"

onclick="editKas(${index})">

✏ Edit

</button>



<button class="btn-hapus"

onclick="bukaPopup(${index})">

🗑 Hapus

</button>



</div>



`;



}



});






document.getElementById("hasilKas").innerHTML = hasil;



}








function editKas(index){



let data = dataKas[index];



document.getElementById("nama").value=

data.nama;



document.getElementById("jenis").value=

data.jenis;



document.getElementById("keterangan").value=

data.keterangan;



document.getElementById("jumlah").value=

data.jumlah;



document.getElementById("tanggal").value=

data.tanggal;





editIndex=index;



window.scrollTo({

top:0,

behavior:"smooth"

});


}








function bukaPopup(index){


hapusIndex=index;


document.getElementById("popupHapus")

.style.display="flex";


}






function tutupPopup(){


document.getElementById("popupHapus")

.style.display="none";


}






function hapusSetuju(){



if(hapusIndex!=-1){



dataKas.splice(hapusIndex,1);



localStorage.setItem(

"dataKas",

JSON.stringify(dataKas)

);



tampilkanKas();



}



tutupPopup();


}







function kosongkanForm(){


document.getElementById("nama").value="";


document.getElementById("jenis").value="";


document.getElementById("keterangan").value="";


document.getElementById("jumlah").value="";


document.getElementById("tanggal").value="";


}







tampilkanKas();



</script>



</body>

</html>
