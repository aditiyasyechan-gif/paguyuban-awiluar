<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin</title>

<link rel="stylesheet" href="../style.css">

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg, #eaf2ff, #f7faff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* BOX LOGIN */
.login-box{
  background:#fff;
  padding:25px;
  width:300px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.login-box h2{
  text-align:center;
  margin-bottom:20px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#2f5bea;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#1f45c9;
}

/* ERROR */
#error{
  color:red;
  font-size:12px;
  text-align:center;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="login-box">
  <h2>🔐 Login Admin</h2>

  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">

  <button onclick="login()">Masuk</button>

  <p id="error"></p>
</div>

<script>
function login(){
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  // LOGIN SEDERHANA (bisa kamu ubah nanti)
  if(user === "admin" && pass === "1234"){
    window.location.href = "dashboard.html";
  } else {
    document.getElementById("error").innerText = "Username atau password salah!";
  }
}
</script>

</body>
</html>
