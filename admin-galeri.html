<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kelola Galeri</title>

<link rel="stylesheet" href="../style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>

body{
background:#f4f8fb;
}


.box{

background:white;

margin:20px;

padding:20px;

border-radius:20px;

box-shadow:0 6px 18px rgba(0,0,0,.08);

}



input,
select{

width:100%;

padding:13px;

margin-bottom:15px;

border-radius:12px;

border:1px solid #ddd;

box-sizing:border-box;

font-size:15px;

}



.btn{

width:100%;

padding:13px;

border:none;

border-radius:20px;

background:#3498db;

color:white;

font-size:16px;

cursor:pointer;

}



.preview{

width:100%;

max-height:250px;

object-fit:cover;

border-radius:15px;

margin-bottom:15px;

display:none;

}



.galeri-list{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

}



.item{

background:white;

border-radius:15px;

overflow:hidden;

box-shadow:0 5px 15px rgba(0,0,0,.08);

}



.item img{

width:100%;

height:130px;

object-fit:cover;

}



.item p{

padding:5px 10px;

font-size:14px;

font-weight:bold;

}



.hapus{

margin:10px;

width:calc(100% - 20px);

padding:10px;

border:none;

border-radius:15px;

background:#e74c3c;

color:white;

}



</style>

</head>


<body>


<a href="admin.html" class="back-btn">

← Kembali Admin

</a>



<div class="box">

<h2>

<i class="fa fa-images"></i>

Kelola Galeri

</h2>


<input 
id="judul"
placeholder="Judul kegiatan">


<select id="kategori">

<option value="">

Pilih Kategori

</option>

<option>
PHBI
</option>

<option>
PHBN
</option>

<option>
Kerja Bakti
</option>

<option>
Lain-lain
</option>

</select>


<input 
type="file"
id="foto"
accept="image/*"
onchange="previewFoto()">



<img id="preview" class="preview">



<button class="btn" onclick="simpanGaleri()">

<i class="fa fa-save"></i>

Simpan Foto

</button>


</div>





<div class="box">

<h3>Daftar Foto</h3>


<div id="hasil" class="galeri-list"></div>


</div>






<script>


let galeri = JSON.parse(

localStorage.getItem("dataGaleri")

) || [];



let fotoBase64="";





function previewFoto(){


let file =
document.getElementById("foto").files[0];


let reader = new FileReader();



reader.onload=function(e){


fotoBase64=e.target.result;


let img=document.getElementById("preview");


img.src=fotoBase64;


img.style.display="block";


}


reader.readAsDataURL(file);


}







function simpanGaleri(){


let judul =
document.getElementById("judul").value;


let kategori =
document.getElementById("kategori").value;




if(judul=="" || kategori=="" || fotoBase64==""){


alert("Lengkapi data dan pilih foto");

return;


}



let data={


judul:judul,

kategori:kategori,

foto:fotoBase64


};



galeri.push(data);



localStorage.setItem(

"dataGaleri",

JSON.stringify(galeri)

);



alert("Foto berhasil disimpan");



kosongkan();



tampilkanGaleri();



}








function tampilkanGaleri(){


let hasil="";



galeri.forEach(function(item,index){


hasil += `

<div class="item">


<img src="${item.foto}">


<p>${item.judul}</p>


<p>${item.kategori}</p>


<button class="hapus"
onclick="hapusFoto(${index})">

🗑 Hapus

</button>


</div>

`;


});



document.getElementById("hasil").innerHTML=hasil;


}







function hapusFoto(index){


if(confirm("Hapus foto ini?")){


galeri.splice(index,1);



localStorage.setItem(

"dataGaleri",

JSON.stringify(galeri)

);



tampilkanGaleri();



}


}






function kosongkan(){


document.getElementById("judul").value="";

document.getElementById("kategori").value="";

document.getElementById("foto").value="";


document.getElementById("preview").style.display="none";


fotoBase64="";


}




tampilkanGaleri();



</script>


</body>

</html>
