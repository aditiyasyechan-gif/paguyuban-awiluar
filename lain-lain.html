<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri Lain-lain</title>

<link rel="stylesheet" href="../../style.css">

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg, #eaf2ff, #f7faff);
}

/* BACK BUTTON */
.back-btn{
  display: inline-block;
  margin: 15px 20px;
  padding: 10px 15px;
  background: #fff;
  border-radius: 12px;
  text-decoration: none;
  color: #333;
  font-weight: bold;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.back-btn:hover{
  transform: translateY(-3px);
}

/* CAPTION */
.caption{
  margin: 20px;
  padding: 15px;
  background: #fff;
  border-radius: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
  font-size: 14px;
  color: #555;
}

/* GRID FOTO */
.gallery{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  padding: 20px;
}

/* FOTO CARD */
.photo{
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.photo:hover{
  transform: scale(1.03);
}

.photo img{
  width: 100%;
  height: 140px;
  object-fit: cover;
}

.photo p{
  margin: 0;
  padding: 8px;
  font-size: 12px;
  text-align: center;
  color: #444;
}
</style>

</head>

<body>

<!-- BACK -->
<a href="index.html" class="back-btn">← Kembali ke Galeri</a>

<!-- TAHUN -->
<div class="caption">
  📅 Kegiatan Tahun 2026
</div>

<!-- FOTO -->
<div class="gallery">

  <div class="photo">
    <img src="https://via.placeholder.com/300x200">
    <p>Kegiatan Tahun 2026</p>
  </div>

  <div class="photo">
    <img src="https://via.placeholder.com/300x200">
    <p>Kegiatan Tahun 2026</p>
  </div>

  <div class="photo">
    <img src="https://via.placeholder.com/300x200">
    <p>Kegiatan Tahun 2026</p>
  </div>

</div>

</body>
</html>
